        function changeSnap(val) {
            currentSnapSetting = val;
            document.querySelectorAll('#grid-snap-sidebar .snap-btn').forEach(b => b.classList.remove('active'));
            const inputEl = document.getElementById('custom-snap-input');
            if (val === 'custom') {
                document.getElementById('snap-custom').classList.add('active');
                inputEl.style.display = 'block';
                applyCustomSnap();
            } else {
                document.getElementById(`snap-${val}`).classList.add('active');
                inputEl.style.display = 'none';
                gridSnap = val / 4; 
            }
        }

        function applyCustomSnap() {
            const val = parseInt(document.getElementById('custom-snap-input').value, 10) || 48;
            gridSnap = val / 4;
        }

        function syncToGame() {
            const diff = currentDifficulty;
            const level = chartData[diff].level; 
            const lanes = TOTAL_LANES;
            document.getElementById('game-meta-display').textContent = `DIFF: ${diff} LV.${level} / ${lanes}K / ${getInitialTimeSignature().text}`; 
        }

        function beatToGameY(beat, viewBeat, judgeY) {
            const speedScale = 150;
            const scrollDiff = getScrollPos(beat) - getScrollPos(viewBeat);
            return judgeY - (scrollDiff * speedScale);
        }

        function drawGame() {
            const now = performance.now();
            frameCount++;
            if (now - lastFpsUpdateTime >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastFpsUpdateTime = now;
            }

            gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
            const gW = gameCanvas.width;
            const gH = gameCanvas.height;
            const judgeY = gH - 40;
            const gameLaneW = gW / TOTAL_LANES;

            const isFeverNow = feverSections.some(fs => viewBeat >= fs.startBeat && viewBeat <= fs.endBeat);
            if (isFeverNow) {
                const pulse = Math.sin(now / 100) * 0.15 + 0.25;
                gameCtx.fillStyle = `rgba(255, 115, 0, ${pulse})`;
                gameCtx.fillRect(0, 0, gW, gH);
            }

            gameCtx.strokeStyle = isFeverNow ? 'rgba(255, 152, 0, 0.4)' : '#222'; 
            gameCtx.lineWidth = 1;
            for(let i=1; i<TOTAL_LANES; i++) {
                gameCtx.beginPath();
                gameCtx.moveTo(i * gameLaneW, 0); gameCtx.lineTo(i * gameLaneW, gH); gameCtx.stroke();
            }

            gameCtx.strokeStyle = isFeverNow ? '#ff9800' : '#00ffff';
            gameCtx.lineWidth = 3;
            gameCtx.beginPath(); gameCtx.moveTo(0, judgeY); gameCtx.lineTo(gW, judgeY); gameCtx.stroke();

            let currentBS = 1.0;
            const activeBsEvents = changeEvents.filter(e => e.type === 'BS' && (e.beat || 0) <= viewBeat);
            if (activeBsEvents.length > 0) {
                activeBsEvents.sort((a, b) => b.beat - a.beat);
                currentBS = activeBsEvents[0].val;
            }
            if (currentBS <= 0) currentBS = 1.0;
            const baseLookAheadBeat = 12;
            const dynamicLookAhead = baseLookAheadBeat / currentBS;

            const minGameBeat = viewBeat - 2;                 
            const maxGameBeat = viewBeat + dynamicLookAhead;
            for (let i = 0; i < notes.length; i++) {
                const n = notes[i];
                if (n.lane > TOTAL_LANES) continue;

                if (n.type === 'long' || n.type === 'guide') {
                    if (n.endBeat < minGameBeat || n.beat > maxGameBeat) continue;
                } else {
                    if (n.beat < minGameBeat || n.beat > maxGameBeat) continue;
                }

                const lx = (n.lane - 1) * gameLaneW;
                if (n.type === 'guide') {
                    const yStart = beatToGameY(n.beat, viewBeat, judgeY);
                    const yEnd = beatToGameY(n.endBeat, viewBeat, judgeY);
                    fillGuideRect(gameCtx, lx, yStart, yEnd, gameLaneW, n);
                } else if (n.type === 'long') {
                    const yStart = beatToGameY(n.beat, viewBeat, judgeY);
                    const yEnd = beatToGameY(n.endBeat, viewBeat, judgeY);

                    gameCtx.fillStyle = n.color ? n.color + "4c" : 'rgba(187, 128, 255, 0.4)';
                    gameCtx.fillRect(lx + 4, yEnd, gameLaneW - 8, yStart - yEnd);
                    const startIsHold = !!n.holdStart;
                    const endIsHold = n.holdMode === 'holdEnd' || !!n.holdEnd;
                    gameCtx.fillStyle = startIsHold ? '#d4a727' : (n.color || '#bc8cff');
                    gameCtx.fillRect(lx + 2, yStart - (startIsHold ? 6 : 4), gameLaneW - 4, startIsHold ? 12 : 8);
                    gameCtx.fillStyle = endIsHold ? '#d4a727' : (n.color || '#bc8cff');
                    gameCtx.fillRect(lx + 2, yEnd - (endIsHold ? 6 : 4), gameLaneW - 4, endIsHold ? 12 : 8);
                } else {
                    const ny = beatToGameY(n.beat, viewBeat, judgeY);
                    if (n.type === 'normal') gameCtx.fillStyle = n.color || ((n.lane % 2 === 1) ? '#ffffff' : '#58a6ff');
                    else if (n.type === 'hold') gameCtx.fillStyle = n.color || '#d4a727';
                    else if (n.type === 'damage') gameCtx.fillStyle = n.color || '#f85149';
                    gameCtx.fillRect(lx + 2, ny - 4, gameLaneW - 4, 8);
                }
            }

            gameCtx.fillStyle = isFeverNow ? '#ff9800' : '#00ff00';
            gameCtx.font = 'bold 12px Arial';
            gameCtx.textAlign = 'left'; gameCtx.textBaseline = 'top';
            gameCtx.fillText(`FPS: ${currentFps}`, 5, 25);
            if(isFeverNow) {
                gameCtx.textAlign = 'center';
                gameCtx.font = 'italic bold 16px Arial';
                gameCtx.fillText(`🔥 FEVER TIME 🔥`, gW / 2, 45);
            }
        }

        function yToBeat(y) {
            let spontaneity = 1000;
            if (audioBuffer) spontaneity = timeToBeat(audioBuffer.duration) + 10;
            const baseY = canvas.height - 60;
            const targetScrollPos = getScrollPos(viewBeat) + (baseY - y) / BEAT_HEIGHT;
            let low = 0, high = spontaneity;
            for(let i=0; i<40; i++) {
                let mid = (low + high) / 2;
                if(getScrollPos(mid) < targetScrollPos) low = mid; else high = mid;
            }
            return low;
        }

        function getScrollPos(targetBeat) {
            let pos = 0;
            let curBeat = 0; let curBS = 1.0; 
            const bsEvents = changeEvents.filter(e => e.type === 'BS').sort((a,b) => (a.beat || 0) - (b.beat || 0));
            for (let i = 0; i < bsEvents.length; i++) {
                const e = bsEvents[i];
                if (targetBeat < e.beat) { pos += (targetBeat - curBeat) * curBS; return pos;
                }
                pos += (e.beat - curBeat) * curBS;
                curBeat = e.beat; curBS = e.val;
            }
            pos += (targetBeat - curBeat) * curBS;
            return pos;
        }

        function beatToY(beat) {
            const baseY = canvas.height - 60;
            return baseY - (getScrollPos(beat) - getScrollPos(viewBeat)) * BEAT_HEIGHT;
        }

        function getSnappedBeat(rawBeat) {
            if (gridSnap <= 0) return rawBeat;
            const step = 1 / gridSnap;
            return Math.round(rawBeat / step) * step;
        }

        function loadAudioFile(input) {
            const file = input.files[0]; if(!file) return;
            document.getElementById('audio-label').textContent = `曲: ${file.name}`;
            const reader = new FileReader();
            reader.onload = function(e) {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioCtx.decodeAudioData(e.target.result, function(buffer) {
                    audioBuffer = buffer;
                    extractWaveform(buffer);
                    alert("音声ファイルを読み込みました！");
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function extractWaveform(buffer) {
            const channelData = buffer.getChannelData(0);
            const sampleRate = buffer.sampleRate;
            const pointsPerSecond = 20;
            const blockSize = Math.floor(sampleRate / pointsPerSecond);
            waveformData = [];
            for (let i = 0; i < channelData.length; i += blockSize) {
                let max = 0;
                for (let j = 0; j < blockSize && (i + j) < channelData.length; j++) {
                    const val = Math.abs(channelData[i + j]);
                    if (val > max) max = val;
                }
                waveformData.push(max);
            }
        }

        function beatToTime(targetBeat) {
            const baseBPM = parseFloat(document.getElementById('meta-bpm').value) || 150;
            const offset = parseFloat(document.getElementById('meta-offset').value) || 0;
            if (targetBeat <= 0) return offset;
            let currentBeat = 0; let currentTime = offset; let currentBPM = baseBPM;
            const bpms = changeEvents.filter(e => e.type === 'BPM').sort((a,b) => (a.beat || 0) - (b.beat || 0));
            for (let i = 0; i < bpms.length; i++) {
                const nextBeat = bpms[i].beat;
                if (targetBeat < nextBeat) return currentTime + (targetBeat - currentBeat) * (60 / currentBPM);
                currentTime += (nextBeat - currentBeat) * (60 / currentBPM);
                currentBeat = nextBeat; currentBPM = bpms[i].val;
            }
            return currentTime + (targetBeat - currentBeat) * (60 / currentBPM);
        }

        function timeToBeat(targetTime) {
            const baseBPM = parseFloat(document.getElementById('meta-bpm').value) || 150;
            const offset = parseFloat(document.getElementById('meta-offset').value) || 0;
            if (targetTime <= offset) return 0;
            let currentBeat = 0; let currentTime = offset; let currentBPM = baseBPM;
            const bpms = changeEvents.filter(e => e.type === 'BPM').sort((a,b) => (a.beat || 0) - (b.beat || 0));
            for (let i = 0; i < bpms.length; i++) {
                const nextBeat = bpms[i].beat;
                const duration = (nextBeat - currentBeat) * (60 / currentBPM);
                if (targetTime < currentTime + duration) return currentBeat + (targetTime - currentTime) / (60 / currentBPM);
                currentTime += duration; currentBeat = nextBeat; currentBPM = bpms[i].val;
            }
            return currentBeat + (targetTime - currentTime) / (60 / currentBPM);
        }

        function loadSEFile(input) {
            const file = input.files[0]; if(!file) return;
            document.getElementById('se-label').textContent = `SE: ${file.name}`;
            const reader = new FileReader();
            reader.onload = function(e) {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioCtx.decodeAudioData(e.target.result, function(buffer) { seBuffer = buffer; alert("SEを上書き読み込みしました！"); });
            };
            reader.readAsArrayBuffer(file);
        }

        function updateVolume() {
            const bgmVol = parseFloat(document.getElementById('volume-bgm').value);
            document.getElementById('volume-bgm-val').textContent = Math.round(bgmVol*100) + "%";
            if (bgmGainNode) bgmGainNode.gain.setValueAtTime(bgmVol, audioCtx ? audioCtx.currentTime : 0);
            const seVol = parseFloat(document.getElementById('volume-se').value);
            document.getElementById('volume-se-val').textContent = Math.round(seVol*100) + "%";
            if (seGainNode) seGainNode.gain.setValueAtTime(seVol, audioCtx ? audioCtx.currentTime : 0);
        }

        function togglePlayback() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (!bgmGainNode) { bgmGainNode = audioCtx.createGain(); bgmGainNode.connect(audioCtx.destination); }
            if (!seGainNode) { seGainNode = audioCtx.createGain(); seGainNode.connect(audioCtx.destination); }
            updateVolume();

            if (isPlaying) {
                if (audioSource) { try { audioSource.stop(); } catch(e){} audioSource = null; }
                isPlaying = false;
                document.getElementById('play-btn').textContent = "再生 (Space)";
            } else {
                playedNotesMap.clear();
                if (!audioBuffer) {
                    startTime = performance.now() - (beatToTime(viewBeat) * 1000 / playbackRate);
                    isPlaying = true;
                    document.getElementById('play-btn').textContent = "停止 (Space)";
                    return;
                }
                audioSource = audioCtx.createBufferSource();
                audioSource.buffer = audioBuffer;
                audioSource.playbackRate.value = playbackRate;
                audioSource.connect(bgmGainNode);
                const chartStartSeconds = beatToTime(viewBeat);
                const audioStartSeconds = Math.max(0, chartStartSeconds);
                startTime = audioCtx.currentTime - (audioStartSeconds / playbackRate);
                audioSource.start(0, audioStartSeconds);
                isPlaying = true;
                document.getElementById('play-btn').textContent = "停止 (Space)";
            }
        }

        function changePlaybackRate(val) {
            playbackRate = parseFloat(val);
            if (isPlaying) { togglePlayback(); togglePlayback(); }
        }

        function checkAndPlaySE(currentBeat) {
            for (let i = 0; i < notes.length; i++) {
                const n = notes[i];
                if (n.type === 'guide') continue;
                if (Math.abs(n.beat - currentBeat) > 2) continue;
                if (currentBeat >= n.beat && !playedNotesMap.has(n)) {
                    playedNotesMap.add(n);
                    triggerClickSound();
                }
            }
        }

        function triggerClickSound() {
            if (!audioCtx) return;
            if (seBuffer) {
                const seSource = audioCtx.createBufferSource(); seSource.buffer = seBuffer;
                seSource.connect(seGainNode); seSource.start(); return;
            }
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(seGainNode);
            osc.type = 'sine'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
            osc.start(); osc.stop(audioCtx.currentTime + 0.06);
        }

        function handleMouseDown(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
            const rawBeat = yToBeat(mouseY); const snappedBeat = getSnappedBeat(rawBeat);
            const lane = Math.floor((mouseX - START_X) / LANE_WIDTH) + 1;

            if (e.button === 2) {
                isRightDragging = true; lastMouseY = e.clientY; return;
            }
            if (e.button !== 0) return;

            if (isTabPressed) return;

            if ((isGuideColorEyedropper || isGuideOpacityEyedropper) && lane >= 1 && lane <= TOTAL_LANES) {
                pickGuideSettingsAt(snappedBeat, lane);
                return;
            }

            if (e.shiftKey) {
                isSelectMode = true; isDragging = true;
                dragStartPos = { x: mouseX, y: mouseY }; dragCurrentPos = { x: mouseX, y: mouseY };
                return;
            }
            isSelectMode = false;
            if (lane < 1 || lane > TOTAL_LANES) return;

            if (currentNoteType === 'guide') {
                const existingGuideIdx = notes.findIndex(n => n.lane === lane && n.type === 'guide' && snappedBeat >= n.beat && snappedBeat <= n.endBeat);
                if (existingGuideIdx >= 0 && longStartBeat === null) {
                    recordUndo();
                    notes.splice(existingGuideIdx, 1);
                    return;
                }
                if (longStartBeat === null) {
                    longStartBeat = snappedBeat;
                    longStartLane = lane;
                } else {
                    let bStart = Math.min(longStartBeat, snappedBeat);
                    let bEnd = Math.max(longStartBeat, snappedBeat);
                    if (bStart === bEnd) bEnd += 0.25; 
                    recordUndo();
                    notes.push({ beat: bStart, endBeat: bEnd, lane: longStartLane, type: 'guide', color: document.getElementById('guide-color').value, guideOpacityMode: document.getElementById('guide-opacity-mode').value, guideOpacity: getGuideOpacityValue() });
                    longStartBeat = null;
                    longStartLane = null;
                }
                return;
            }

            if (currentNoteType === 'long') {
                const existingLongIdx = notes.findIndex(n => n.lane === lane && n.type === 'long' && snappedBeat >= n.beat && snappedBeat <= n.endBeat);
                if (existingLongIdx >= 0 && longStartBeat === null) {
                    recordUndo();
                    notes.splice(existingLongIdx, 1);
                    return;
                }
                if (longStartBeat === null) {
                    longStartBeat = snappedBeat;
                    longStartLane = lane;
                } else {
                    let bStart = Math.min(longStartBeat, snappedBeat);
                    let bEnd = Math.max(longStartBeat, snappedBeat);
                    if (bStart === bEnd) bEnd += 0.25;
                    recordUndo();
                    notes.push({ beat: bStart, endBeat: bEnd, lane: longStartLane, type: 'long' });
                    longStartBeat = null;
                    longStartLane = null;
                }
                return;
            }

            if (currentNoteType === 'hold') {
                const endpointLongIdx = notes.findIndex(n => {
                    if (n.lane !== lane || n.type !== 'long') return false;
                    const tolerance = Math.max(0.03, 18 / BEAT_HEIGHT);
                    return Math.abs(snappedBeat - n.beat) <= tolerance || Math.abs(snappedBeat - n.endBeat) <= tolerance;
                });
                if (endpointLongIdx >= 0) {
                    recordUndo();
                    const target = notes[endpointLongIdx];
                    if (target.holdMode === 'holdEnd') target.holdEnd = true;
                    const startDist = Math.abs(snappedBeat - target.beat);
                    const endDist = Math.abs(snappedBeat - target.endBeat);
                    if (endDist < startDist) {
                        target.holdEnd = !target.holdEnd;
                    } else {
                        target.holdStart = !target.holdStart;
                    }
                    delete target.holdMode;
                    draw();
                    return;
                }
            }

            const existingIndex = notes.findIndex(n => n.lane === lane && Math.abs(n.beat - snappedBeat) < 0.02 && n.type !== 'long' && n.type !== 'guide');
            if (existingIndex >= 0) { recordUndo(); notes.splice(existingIndex, 1); return; }
            
            const existingLongIdx = notes.findIndex(n => n.lane === lane && n.type === 'long' && snappedBeat >= n.beat && snappedBeat <= n.endBeat);
            if (existingLongIdx >= 0) { recordUndo(); notes.splice(existingLongIdx, 1); return; }

            recordUndo();
            notes.push({ beat: snappedBeat, lane: lane, type: currentNoteType });
        }

        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
            
            mouseCurrentBeat = getSnappedBeat(yToBeat(mouseY));
            mouseCurrentLane = Math.floor((mouseX - START_X) / LANE_WIDTH) + 1;

            if (isRightDragging) {
                if (isPlaying) return;
                const deltaY = e.clientY - lastMouseY; lastMouseY = e.clientY;
                viewBeat = Math.max(0, viewBeat + (deltaY / BEAT_HEIGHT));
                document.getElementById('current-beat-disp').textContent = viewBeat.toFixed(2);
                return;
            }
            if (!isDragging || !isSelectMode) return;
            dragCurrentPos.x = mouseX; dragCurrentPos.y = mouseY;
            calculateSelection();
        }

        function handleMouseUp(e) {
            if (e.button === 2) isRightDragging = false;
            if (e.button === 0 && isDragging && isSelectMode) { isDragging = false; calculateSelection(); }
        }

        function calculateSelection() {
            const x1 = Math.min(dragStartPos.x, dragCurrentPos.x); const x2 = Math.max(dragStartPos.x, dragCurrentPos.x);
            const y1 = Math.min(dragStartPos.y, dragCurrentPos.y); const y2 = Math.max(dragStartPos.y, dragCurrentPos.y);
            const isCurrentGuide = (currentNoteType === 'guide');
            selectedNotes = notes.filter(n => {
                if (isCurrentGuide !== (n.type === 'guide')) return false;
                const nx = START_X + (n.lane - 1) * LANE_WIDTH + LANE_WIDTH / 2; const ny = beatToY(n.beat);
                return nx >= x1 && nx <= x2 && ny >= y1 && ny <= y2;
            });
            updateSelection();
        }

        function updateSelection() {
            const info = document.getElementById('select-info'); const zone = document.getElementById('batch-edit-zone');
            if (selectedNotes.length > 0) {
                info.textContent = `選択中のオブジェクト: ${selectedNotes.length}コ`; zone.style.display = 'flex';
            } else { info.textContent = `選択中のオブジェクト: 0コ`; zone.style.display = 'none'; }
        }

        function deleteSelected() {
            if (selectedNotes.length === 0) return;
            recordUndo();
            chartData[currentDifficulty].notes = chartData[currentDifficulty].notes.filter(n => !selectedNotes.includes(n));
            notes = chartData[currentDifficulty].notes;
            selectedNotes = []; 
            updateSelection();
        }

        function applyCustomColorToSelected() {
            if (selectedNotes.length === 0) return;
            recordUndo();
            const color = document.getElementById('note-custom-color').value.trim();
            selectedNotes.forEach(n => { if(color) n.color = color; else delete n.color; });
        }

        function applyGuideOpacityToSelected() {
            if (!selectedNotes.some(n => n.type === 'guide')) return;
            recordUndo();
            const mode = document.getElementById('note-guide-opacity-mode').value;
            const opacity = clampOpacity(document.getElementById('note-guide-opacity').value);
            selectedNotes.forEach(n => {
                if (n.type === 'guide') {
                    n.guideOpacityMode = mode;
                    n.guideOpacity = opacity;
                }
            });
        }

        function applyBatchGimmick() {
            if (selectedNotes.length === 0) return;
            const type = document.getElementById('batch-gimmick-type').value;
            const rawVal = document.getElementById('batch-gimmick-val').value.trim();
            const val = parseChangeValue(type, rawVal || '1.0');
            recordUndo();
            selectedNotes.forEach(n => {
                const exist = changeEvents.find(e => e.type === type && Math.abs(e.beat - n.beat) < 0.01);
                if (exist) exist.val = val; else changeEvents.push({ beat: n.beat, type: type, val: val });
            });
            updateGimmickList(); alert(`${type}ギミックを一括適用しました`);
        }

        function openGimmickDialog(beat) {
            activeDialogBeat = beat;
            document.getElementById('dialog-beat-disp').textContent = beat.toFixed(2);
            document.getElementById('dialog-overlay').style.display = 'block';
            document.getElementById('gimmick-dialog').style.display = 'flex';
        }

        function closeGimmickDialog() {
            document.getElementById('dialog-overlay').style.display = 'none';
            document.getElementById('gimmick-dialog').style.display = 'none';
        }

        function saveGimmickDialog() {
            const type = document.getElementById('dialog-type').value;
            const rawVal = document.getElementById('dialog-val').value.trim();
            const val = parseChangeValue(type, rawVal);
            const exist = changeEvents.find(e => e.type === type && Math.abs(e.beat - activeDialogBeat) < 0.01);
            recordUndo();
            if(exist) exist.val = val; else changeEvents.push({ beat: activeDialogBeat, type: type, val: val });
            updateGimmickList(); closeGimmickDialog();
        }

        function updateGimmickList() {
            changeEvents.sort((a,b) => (a.beat || 0) - (b.beat || 0));
            feverSections.sort((a,b) => a.startBeat - b.startBeat);
            const box = document.getElementById('gimmick-list-box');
            
            if(changeEvents.length === 0 && feverSections.length === 0) { 
                box.innerHTML = `<div style="color:var(--text-muted); text-align:center;">イベントなし</div>`; 
                return; 
            }

            let html = "";
            changeEvents.forEach((e, idx) => {
                html += `
                    <div style="display:flex; justify-content:space-between; background:#21262d; padding:4px; margin-bottom:2px; border-radius:4px;">
                        <span>[${e.type}] ${e.beat.toFixed(2)}拍目: <b>${formatChangeValue(e)}</b></span>
                        <button onclick="deleteGimmick(${idx})" style="padding:1px 6px; font-size:10px; background:#da3637; border:none; border-radius:3px;">削除</button>
                    </div>
                `;
            });
            feverSections.forEach((fs, idx) => {
                html += `
                    <div style="display:flex; justify-content:space-between; background:rgba(255,152,0,0.15); border: 1px solid rgba(255,152,0,0.3); padding:4px; margin-bottom:2px; border-radius:4px;">
                        <span style="color:#ff9800;">[FEVER] ${fs.startBeat.toFixed(2)} ～ ${fs.endBeat.toFixed(2)} 拍</span>
                        <button onclick="deleteFever(${idx})" style="padding:1px 6px; font-size:10px; background:#da3637; border:none; border-radius:3px;">削除</button>
                    </div>
                `;
            });
            box.innerHTML = html;
        }

        function deleteGimmick(idx) { recordUndo(); changeEvents.splice(idx, 1); updateGimmickList(); }
        function deleteFever(idx) { recordUndo(); feverSections.splice(idx, 1); updateGimmickList(); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const laneOpacityFactor = laneOpacityAtBeat(viewBeat);
            ctx.fillStyle = 'rgba(2,4,8,' + (0.3 * laneOpacityFactor) + ')';
            ctx.fillRect(START_X, 0, TOTAL_LANES * LANE_WIDTH, canvas.height);
            for (let i = 0; i < TOTAL_LANES; i++) {
                const x = START_X + i * LANE_WIDTH;
                ctx.strokeStyle = 'rgba(33,38,45,' + laneOpacityFactor + ')'; ctx.lineWidth = 1; ctx.strokeRect(x, 0, LANE_WIDTH, canvas.height);
            }
            const minRenderBeat = yToBeat(canvas.height); const maxRenderBeat = yToBeat(0);

            if (waveformData.length > 0) {
                ctx.fillStyle = 'rgba(56, 189, 248, 0.08)';
                const pointsPerSecond = 20; const maxWidth = TOTAL_LANES * LANE_WIDTH;
                const startTimeVisible = beatToTime(Math.max(0, maxRenderBeat));
                const endTimeVisible = beatToTime(Math.max(0, minRenderBeat));
                const startIdx = Math.max(0, Math.floor(startTimeVisible * pointsPerSecond) - 5);
                const endIdx = Math.min(waveformData.length - 1, Math.ceil(endTimeVisible * pointsPerSecond) + 5);
                for (let idx = startIdx; idx <= endIdx; idx++) {
                    const t = idx / pointsPerSecond; const b = timeToBeat(t); const y = beatToY(b);
                    if (y < 0 || y > canvas.height) continue;
                    const amp = waveformData[idx] * (maxWidth / 2);
                    ctx.fillRect(START_X + (maxWidth/2) - amp, y - 1, amp * 2, 2);
                }
            }

            feverSections.forEach(fs => {
                if (fs.endBeat < minRenderBeat || fs.startBeat > maxRenderBeat) return;
                const ys = beatToY(fs.startBeat);
                const ye = beatToY(fs.endBeat);
                ctx.fillStyle = 'rgba(255, 152, 0, 0.12)';
                ctx.fillRect(START_X, ye, TOTAL_LANES * LANE_WIDTH, ys - ye);
                
                ctx.strokeStyle = 'rgba(255, 152, 0, 0.5)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(START_X, ys); ctx.lineTo(START_X + TOTAL_LANES * LANE_WIDTH, ys); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(START_X, ye); ctx.lineTo(START_X + TOTAL_LANES * LANE_WIDTH, ye); ctx.stroke();
            });

            const startIntegerBeat = Math.floor(minRenderBeat); const endIntegerBeat = Math.ceil(maxRenderBeat);
            for (let b = startIntegerBeat; b <= endIntegerBeat; b++) {
                if (b < 0) continue; const y = beatToY(b);
                const isMeasure = isMeasureLineBeat(b);
                ctx.strokeStyle = isMeasure ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
                ctx.lineWidth = isMeasure ? 2 : 1; ctx.beginPath(); ctx.moveTo(START_X, y);
                ctx.lineTo(START_X + TOTAL_LANES * LANE_WIDTH, y); ctx.stroke();
                ctx.fillStyle = isMeasure ? '#fff' : '#8b949e';
                ctx.font = '10px Arial'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
                ctx.fillText(b, START_X - 10, y);
            }

            getMeasureLineBeats(minRenderBeat, maxRenderBeat).forEach(b => {
                if (Math.abs(b - Math.round(b)) < 0.002) return;
                const y = beatToY(b);
                ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(START_X, y); ctx.lineTo(START_X + TOTAL_LANES * LANE_WIDTH, y); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
                ctx.fillText(b.toFixed(2), START_X - 10, y);
            });

            changeEvents.forEach(e => {
                if (e.beat < minRenderBeat - 1 || e.beat > maxRenderBeat + 1) return;
                const y = beatToY(e.beat); ctx.strokeStyle = '#ff55ff'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(START_X, y); ctx.lineTo(START_X + TOTAL_LANES * LANE_WIDTH, y); ctx.stroke();
                ctx.fillStyle = '#ff55ff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'left';
                ctx.fillText(`[${e.type}: ${formatChangeValue(e)}]`, START_X + TOTAL_LANES * LANE_WIDTH + 8, y);
            });

            if (isTabPressed && feverStartBeat !== null) {
                const ys = beatToY(feverStartBeat);
                const ye = beatToY(mouseCurrentBeat);
                ctx.fillStyle = 'rgba(255, 152, 0, 0.3)';
                ctx.fillRect(START_X, Math.min(ys, ye), TOTAL_LANES * LANE_WIDTH, Math.abs(ys - ye));
                ctx.font = 'bold 11px Arial'; ctx.fillStyle = '#ff9800'; ctx.textAlign = 'left';
                ctx.fillText(`Fever区間指定中... (${feverStartBeat.toFixed(2)} ～ ${mouseCurrentBeat.toFixed(2)})`, START_X + TOTAL_LANES * LANE_WIDTH + 8, ye);
            }

            if (longStartBeat !== null && mouseCurrentLane >= 1 && mouseCurrentLane <= TOTAL_LANES) {
                const x = START_X + (longStartLane - 1) * LANE_WIDTH;
                const ys = beatToY(longStartBeat); const ye = beatToY(mouseCurrentBeat);
                ctx.save();
                if (currentNoteType === 'long') {
                    ctx.fillStyle = 'rgba(187, 128, 255, 0.15)'; ctx.fillRect(x + 8, Math.min(ys, ye), LANE_WIDTH - 16, Math.abs(ys - ye));
                    ctx.fillStyle = 'rgba(187, 128, 255, 0.5)'; ctx.fillRect(x + 4, ys - 6, LANE_WIDTH - 8, 12); ctx.fillRect(x + 4, ye - 6, LANE_WIDTH - 8, 12);
                } else if (currentNoteType === 'guide') {
                    ctx.fillStyle = 'rgba(16, 185, 129, 0.1)'; ctx.fillRect(x, Math.min(ys, ye), LANE_WIDTH, Math.abs(ys - ye));
                    ctx.strokeStyle = 'rgba(16, 185, 129, 0.4)'; ctx.lineWidth = 2; ctx.strokeRect(x, Math.min(ys, ye), LANE_WIDTH, Math.abs(ys - ye));
                }
                ctx.restore();
            }

            for (let i = 0; i < notes.length; i++) {
                const n = notes[i]; if (n.lane > TOTAL_LANES) continue;
                if (n.type === 'long' || n.type === 'guide') {
                    if (n.endBeat < minRenderBeat - 1 || n.beat > maxRenderBeat + 1) continue;
                } else { if (n.beat < minRenderBeat - 1 || n.beat > maxRenderBeat + 1) continue; }
                const x = START_X + (n.lane - 1) * LANE_WIDTH; const isSelected = selectedNotes.includes(n);
                const customColor = n.color || null;

                if (n.type === 'normal') {
                    const y = beatToY(n.beat); if (y < -20 || y > canvas.height + 20) continue;
                    ctx.fillStyle = customColor || ((n.lane % 2 === 1) ? '#ffffff' : '#58a6ff');
                    ctx.fillRect(x + 4, y - 6, LANE_WIDTH - 8, 12);
                } else if (n.type === 'hold') {
                    const y = beatToY(n.beat); if (y < -20 || y > canvas.height + 20) continue;
                    ctx.fillStyle = customColor || '#d4a727'; ctx.fillRect(x + 4, y - 6, LANE_WIDTH - 8, 12);
                } else if (n.type === 'damage') {
                    const y = beatToY(n.beat); if (y < -20 || y > canvas.height + 20) continue;
                    ctx.fillStyle = customColor || '#f85149'; ctx.fillRect(x + 4, y - 6, LANE_WIDTH - 8, 12);
                } else if (n.type === 'long') {
                    const ys = beatToY(n.beat); const ye = beatToY(n.endBeat);
                    ctx.fillStyle = customColor ? customColor + "4c" : 'rgba(187, 128, 255, 0.3)';
                    ctx.fillRect(x + 8, ye, LANE_WIDTH - 16, ys - ye);
                    const startIsHold = !!n.holdStart;
                    const endIsHold = n.holdMode === 'holdEnd' || !!n.holdEnd;
                    ctx.fillStyle = startIsHold ? '#d4a727' : (customColor || '#bc8cff');
                    ctx.fillRect(x + 4, ys - (startIsHold ? 8 : 6), LANE_WIDTH - 8, startIsHold ? 16 : 12);
                    ctx.fillStyle = endIsHold ? '#d4a727' : (customColor || '#bc8cff');
                    ctx.fillRect(x + 4, ye - (endIsHold ? 8 : 6), LANE_WIDTH - 8, endIsHold ? 16 : 12);
                } else if (n.type === 'guide') {
                    const ys = beatToY(n.beat); const ye = beatToY(n.endBeat);
                    fillGuideRect(ctx, x, ys, ye, LANE_WIDTH, n);
                    ctx.strokeStyle = getGuideColor(n); ctx.lineWidth = 2; ctx.strokeRect(x, ye, LANE_WIDTH, ys - ye);
                }
                if (isSelected) {
                    const y = beatToY(n.beat); ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 2;
                    if(n.type==='long'||n.type==='guide'){ const ye=beatToY(n.endBeat); ctx.strokeRect(x+2, ye-8, LANE_WIDTH-4, (y-ye)+16); }
                    else { ctx.strokeRect(x + 2, y - 8, LANE_WIDTH - 4, 16); }
                }
            }

            const judgeLineY = beatToY(viewBeat);
            const isFeverNow = feverSections.some(fs => viewBeat >= fs.startBeat && viewBeat <= fs.endBeat);
            ctx.strokeStyle = isFeverNow ? '#ff9800' : '#00ffff'; 
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(START_X, judgeLineY); ctx.lineTo(START_X + TOTAL_LANES * LANE_WIDTH, judgeLineY); ctx.stroke();

            if (isDragging && isSelectMode) {
                ctx.strokeStyle = 'rgba(255, 235, 59, 0.8)'; ctx.lineWidth = 1; ctx.fillStyle = 'rgba(255, 235, 59, 0.1)';
                ctx.fillRect(dragStartPos.x, dragStartPos.y, dragCurrentPos.x - dragStartPos.x, dragCurrentPos.y - dragStartPos.y);
                ctx.strokeRect(dragStartPos.x, dragStartPos.y, dragCurrentPos.x - dragStartPos.x, dragCurrentPos.y - dragStartPos.y);
            }
        }

        function triggerImport() { document.getElementById('import-file').click(); }
        
        function importChart(input) {
            const file = input.files[0]; if (!file) return; 
            importedFileName = file.name; // インポートしたファイル名を保持
            document.getElementById('export-btn').textContent = `譜面を上書き保存 (${file.name})`;
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                
                DIFFICULTIES.forEach(d => {
                    chartData[d] = { level: 10, notes: [], changeEvents: [], feverSections: [] };
                });

                let activeImportDiff = "Normal"; 

                lines.forEach(line => {
                    line = line.trim(); if (!line || line.startsWith('#')) return;
                    
                    if (line.startsWith('TITLE:')) document.getElementById('meta-title').value = line.replace('TITLE:', '').trim();
                    else if (line.startsWith('LANES:')) changeLaneCount(parseInt(line.replace('LANES:', '').trim(), 10));
                    else if (line.startsWith('BPM:')) document.getElementById('meta-bpm').value = line.replace('BPM:', '').trim();
                    else if (line.startsWith('TIMESIG:')) document.getElementById('meta-time-signature').value = normalizeTimeSignature(line.replace('TIMESIG:', '').trim());
                    else if (line.startsWith('OFFSET:')) document.getElementById('meta-offset').value = line.replace('OFFSET:', '').trim();
                    else if (line.startsWith('SONG:')) document.getElementById('meta-song').value = line.replace('SONG:', '').trim();
                    else if (line.toUpperCase().startsWith('BACKGROUND:')) document.getElementById('meta-background').value = line.replace(/^BACKGROUND:/i, '').trim();
                    else if (line.toUpperCase().startsWith('MOVIE:')) document.getElementById('meta-movie').value = line.replace(/^MOVIE:/i, '').trim();
                    
                    else if (line.startsWith('DIFFICULTY:')) {
                        const dStr = line.replace('DIFFICULTY:', '').trim();
                        if (DIFFICULTIES.includes(dStr)) activeImportDiff = dStr;
                    }
                    else if (line.startsWith('LEVEL:')) {
                        chartData[activeImportDiff].level = parseInt(line.replace('LEVEL:', '').trim(), 10) || 10;
                    }
                    
                    else if (line.startsWith('FEVER:')) {
                        const range = line.replace('FEVER:', '').trim().split('-');
                        if(range.length === 2) chartData[activeImportDiff].feverSections.push({ startBeat: parseFloat(range[0]), endBeat: parseFloat(range[1]) });
                    } else if (line.startsWith('CHANGE:')) {
                        const parts = line.replace('CHANGE:', '').split(',');
                        if(parts.length >= 3) {
                            const type = parts[1].trim();
                            const rawVal = parts.slice(2).join(',').trim();
                            chartData[activeImportDiff].changeEvents.push({ beat: parseFloat(parts[0]), type: type, val: parseChangeValue(type, rawVal) });
                        }
                    } else {
                        const parts = line.split(','); if (parts.length < 2) return;
                        const beatStr = parts[0].trim(); const lane = parseInt(parts[1].trim(), 10);
                        const color = parts[2] ? parts[2].trim() : undefined;
                        if (beatStr.includes('-')) {
                            const bParts = beatStr.split('-'); let sBStr = bParts[0]; let eBStr = bParts[1];
                            let type = 'long'; let holdStart = false; let holdEnd = false;
                            if (sBStr.endsWith('H')) { holdStart = true; sBStr = sBStr.replace('H',''); }
                            if (eBStr.endsWith('G')) { type = 'guide'; eBStr = eBStr.replace('G',''); } else if (eBStr.endsWith('H')) { holdEnd = true; eBStr = eBStr.replace('H',''); }
                            const note = { beat: parseFloat(sBStr), endBeat: parseFloat(eBStr), lane: lane, type: type };
                            if (holdStart) note.holdStart = true;
                            if (holdEnd) note.holdEnd = true;
                            if (color) note.color = color;
                            if (type === 'guide') {
                                const extras = parts.slice(3).map(p => p.trim()).filter(Boolean);
                                extras.forEach(extra => {
                                    if (extra === 'fade' || extra === 'solid' || extra === 'rise') note.guideOpacityMode = extra;
                                    else if (!Number.isNaN(parseFloat(extra))) note.guideOpacity = clampOpacity(extra);
                                });
                            }
                            chartData[activeImportDiff].notes.push(note);
                        } else {
                            let type = 'normal'; let bStr = beatStr;
                            if (bStr.endsWith('H')) { type = 'hold'; bStr = bStr.replace('H',''); }
                            else if (bStr.endsWith('D')) { type = 'damage'; bStr = bStr.replace('D',''); }
                            chartData[activeImportDiff].notes.push({ beat: parseFloat(bStr), lane: lane, type: type, color: color });
                        }
                    }
                });

                document.getElementById('meta-difficulty').value = currentDifficulty;
                switchDifficulty(currentDifficulty);
                clearUndoHistory();
                alert(`「${file.name}」をインポートしました！`);
            };
            reader.readAsText(file);
        }

        function exportChart() {
            let output = [];
            output.push(`TITLE: ${document.getElementById('meta-title').value}`);
            output.push(`LANES: ${TOTAL_LANES}`);
            output.push(`BPM: ${document.getElementById('meta-bpm').value}`);
            output.push(`TIMESIG: ${getInitialTimeSignature().text}`);
            output.push(`OFFSET: ${document.getElementById('meta-offset').value}`);
            output.push(`SONG: ${document.getElementById('meta-song').value}`);
            const backgroundName = document.getElementById('meta-background').value.trim();
            if (backgroundName) output.push(`BACKGROUND: ${backgroundName}`);
            const movieLink = document.getElementById('meta-movie').value.trim();
            if (movieLink) output.push(`MOVIE: ${movieLink}`);
            output.push(``); 

            let exportedCount = 0;

            DIFFICULTIES.forEach(d => {
                const dData = chartData[d];
                if (dData.notes.length === 0) return;

                exportedCount++;

                output.push(`// ==========================================`);
                output.push(`DIFFICULTY: ${d}`);
                output.push(`LEVEL: ${dData.level}`);
                output.push(`// ==========================================`);

                dData.changeEvents.sort((a,b) => (a.beat || 0) - (b.beat || 0));
                dData.changeEvents.forEach(e => { output.push(`CHANGE: ${e.beat.toFixed(2)}, ${e.type}, ${formatChangeValue(e)}`); });
                
                dData.feverSections.sort((a,b) => a.startBeat - b.startBeat);
                dData.feverSections.forEach(fs => { output.push(`FEVER: ${fs.startBeat.toFixed(2)}-${fs.endBeat.toFixed(2)}`); });
                
                dData.notes.sort((a, b) => (a.beat || 0) - (b.beat || 0));
                dData.notes.forEach(n => {
                    if (n.lane > TOTAL_LANES) return;
                    let lineStr = "";
                    if (n.type === 'long' || n.type === 'guide') {
                        if (n.holdMode === 'holdEnd') n.holdEnd = true;
                        const startSuffix = (n.type === 'long' && n.holdStart) ? 'H' : '';
                        const endSuffix = (n.type === 'guide') ? 'G' : ((n.type === 'long' && n.holdEnd) ? 'H' : '');
                        lineStr = `${n.beat.toFixed(2)}${startSuffix}-${n.endBeat.toFixed(2)}${endSuffix},${n.lane}`;
                    } else {
                        const suffix = (n.type === 'hold') ? 'H' : (n.type === 'damage' ? 'D' : '');
                        lineStr = `${n.beat.toFixed(2)}${suffix},${n.lane}`;
                    }
                    if(n.color) { lineStr += `,${n.color}`; }
                    if(n.type === 'guide') {
                        const opacity = getGuideOpacityValue(n);
                        if(n.guideOpacityMode === 'fade' || n.guideOpacityMode === 'rise' || opacity < 0.999) {
                            if(!n.color) lineStr += ',';
                            lineStr += ',' + getGuideOpacityMode(n);
                        }
                        if(opacity < 0.999) {
                            if(!n.color && n.guideOpacityMode !== 'fade') lineStr += ',';
                            lineStr += ',' + opacity.toFixed(2);
                        }
                    }
                    output.push(lineStr);
                });
                output.push(``); 
            });

            if (exportedCount === 0) {
                alert("ノーツが配置されている難易度が1つも無いため、書き出せません。");
                return;
            }

            const blob = new Blob([output.join('\r\n')], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = importedFileName;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            if (typeof markEditorSaved === 'function') markEditorSaved();
        }

        function getCurrentBeat() {
            if (!isPlaying) return viewBeat;
            if (!audioBuffer) return timeToBeat((performance.now() - startTime) / 1000 * playbackRate);
            return timeToBeat((audioCtx.currentTime - startTime) * playbackRate);
        }

        
        // ===== 864beat editor safety: leave confirm + autosave recovery =====
        let hasUnsavedChanges = false;
        let lastEditorBackupText = "";
        const EDITOR_BACKUP_KEY = "864beat-editor-autosave-v1";

        function collectEditorMetaForBackup() {
            const ids = ["meta-title", "meta-artist", "meta-charter", "meta-background", "meta-bpm", "meta-offset", "meta-song", "meta-background", "meta-movie", "meta-difficulty"];
            const meta = {};
            ids.forEach(id => { const el = document.getElementById(id); if (el) meta[id] = el.value; });
            return meta;
        }

        function applyEditorMetaFromBackup(meta) {
            if (!meta) return;
            Object.keys(meta).forEach(id => { const el = document.getElementById(id); if (el) el.value = meta[id]; });
        }

        function createEditorBackupPayload() {
            return { savedAt: new Date().toISOString(), importedFileName, currentDifficulty, totalLanes: TOTAL_LANES, chartData, meta: collectEditorMetaForBackup(), viewBeat, gridSnap, currentSnapSetting };
        }

        function saveEditorBackupNow() {
            try {
                const text = JSON.stringify(createEditorBackupPayload());
                if (text !== lastEditorBackupText) { localStorage.setItem(EDITOR_BACKUP_KEY, text); lastEditorBackupText = text; }
            } catch (err) { console.warn("editor autosave failed", err); }
        }

        function markEditorDirty() { hasUnsavedChanges = true; }
        function markEditorSaved() { hasUnsavedChanges = false; saveEditorBackupNow(); }

        function restoreEditorBackupIfNeeded() {
            try {
                const text = localStorage.getItem(EDITOR_BACKUP_KEY);
                if (!text) return;
                const backup = JSON.parse(text);
                if (!backup || !backup.chartData) return;
                const savedAt = backup.savedAt ? new Date(backup.savedAt).toLocaleString() : "unknown time";
                if (!confirm("自動バックアップがあります。復元しますか？\n保存日時: " + savedAt)) return;
                Object.keys(chartData).forEach(key => delete chartData[key]);
                Object.keys(backup.chartData).forEach(key => { chartData[key] = backup.chartData[key]; });
                if (backup.totalLanes) TOTAL_LANES = backup.totalLanes;
                if (backup.importedFileName) importedFileName = backup.importedFileName;
                if (backup.currentDifficulty && chartData[backup.currentDifficulty]) currentDifficulty = backup.currentDifficulty;
                if (typeof backup.viewBeat === "number") viewBeat = backup.viewBeat;
                if (typeof backup.gridSnap === "number") gridSnap = backup.gridSnap;
                if (typeof backup.currentSnapSetting === "number") currentSnapSetting = backup.currentSnapSetting;
                applyEditorMetaFromBackup(backup.meta);
                if (chartData[currentDifficulty]) { notes = chartData[currentDifficulty].notes; changeEvents = chartData[currentDifficulty].changeEvents; feverSections = chartData[currentDifficulty].feverSections; }
                const diffSelect = document.getElementById("meta-difficulty"); if (diffSelect) diffSelect.value = currentDifficulty;
                const exportBtn = document.getElementById("export-btn"); if (exportBtn) exportBtn.textContent = "譜面を上書き保存 (" + importedFileName + ")";
                if (typeof updateDifficultyTabs === "function") updateDifficultyTabs();
                if (typeof syncToGame === "function") syncToGame();
                if (typeof updateUI === "function") updateUI();
                if (typeof resizeCanvas === "function") resizeCanvas();
                hasUnsavedChanges = true;
                saveEditorBackupNow();
                alert("自動バックアップを復元しました。必要なら譜面を書き出してください。");
            } catch (err) { console.warn("editor restore failed", err); }
        }

        function installEditorSafetyGuards() {
            document.addEventListener("contextmenu", event => event.preventDefault(), true);
            window.addEventListener("beforeunload", event => {
                if (!hasUnsavedChanges) return;
                saveEditorBackupNow();
                event.preventDefault();
                event.returnValue = "";
            });
            history.replaceState({ editorGuard: true }, "", location.href);
            history.pushState({ editorGuard: true }, "", location.href);
            window.addEventListener("popstate", () => {
                if (!hasUnsavedChanges) return;
                const ok = confirm("保存されていない変更があります。ページを離れますか？");
                if (!ok) history.pushState({ editorGuard: true }, "", location.href);
            });
            document.addEventListener("input", markEditorDirty, true);
            document.addEventListener("change", markEditorDirty, true);
            document.addEventListener("pointerdown", event => {
                if (event.target && event.target.closest && event.target.closest("button, canvas, input, select")) markEditorDirty();
            }, true);
            document.addEventListener("keydown", event => {
                if (event.ctrlKey || event.metaKey || event.altKey) return;
                markEditorDirty();
            }, true);
            setInterval(() => { if (hasUnsavedChanges) saveEditorBackupNow(); }, 3000);
        }

        window.onload = function() {
            initEditor();
            installEditorSafetyGuards();
            setTimeout(restoreEditorBackupIfNeeded, 300);
        };
    </script>
