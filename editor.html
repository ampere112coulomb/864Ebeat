<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>864Editor</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --box-bg: #21262d;
            --accent: #58a6ff;
            --accent-active: #1f6feb;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --success: #238636;
            --success-active: #2ea043;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Arial', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            user-select: none;
        }

        #main-container {
            display: flex;
            flex: 1; height: calc(100vh - 60px); overflow: hidden;
        }

        /* 左側パネル */
        #sidebar {
            width: 320px;
            background: var(--panel-bg);
            border-right: 1px solid #30363d; padding: 20px;
            box-sizing: border-box; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }
        h2 { font-size: 14px; margin: 0 0 5px 0; color: #fff;
            border-bottom: 1px solid #30363d; padding-bottom: 5px; }
        .control-group { display: flex; flex-direction: column;
            gap: 5px; }
        label { font-size: 11px; font-weight: bold; color: var(--text-muted);
        }
        input, select, button {
            background: var(--box-bg);
            color: #fff; border: 1px solid #30363d;
            padding: 8px; border-radius: 6px; font-size: 13px; outline: none;
        }
        button { cursor: pointer; font-weight: bold; transition: 0.1s;
        }
        button:hover { background: #30363d; border-color: var(--accent);
        }
        button.active { background: var(--accent-active); border-color: var(--accent);
        }

        .note-type-btn { display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
        }
        .file-buttons { display: flex; flex-direction: column; gap: 5px;
        }

        /* 音量ミキサー */
        .volume-mixer {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #21262d;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .volume-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .volume-row label { width: 60px;
        }
        .volume-row input[type="range"] {
            flex: 1;
            cursor: pointer; height: 6px; background: #21262d; border-radius: 3px; border: none; padding: 0;
        }
        .volume-val { font-size: 11px; width: 35px; text-align: right; color: #fff; font-family: monospace;
        }

        /* 中央エディタエリア */
        #editor-container {
            flex: 1;
            background: #070a0e; position: relative;
            display: flex; justify-content: center; align-items: center;
            height: 100%; overflow: hidden; outline: none;
        }
        /* エディタとミニマップを並べるラッパー */
        #canvas-wrapper {
            display: flex;
            height: 100%;
            position: relative;
        }
        #editor-canvas { display: block; background: #090d16; cursor: crosshair;
        }
        /* ミニマップ用キャンバスのスタイル */
        #minimap-canvas {
            display: block;
            background: #0b0f19;
            border-left: 1px solid #21262d;
            cursor: pointer;
        }

        /* 右側セクション欄の左側：縦型グリッド選択バー */
        #grid-snap-sidebar {
            width: 70px;
            background: #10141b; border-left: 1px solid #30363d;
            display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 4px; overflow-y: auto;
        }
        .snap-btn { width: 55px; height: 32px; font-size: 11px; padding: 0; text-align: center;
            line-height: 30px; }
        #custom-snap-input { width: 45px; padding: 4px; text-align: center; font-size: 11px;
            display: none; margin-top: 2px; }

        /* 右側パネル */
        #right-panel {
            width: 320px;
            background: var(--panel-bg); border-left: 1px solid #30363d;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .panel-section { padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px;
        }

        /* ゲーム画面プレビュー枠 */
        #game-preview-zone {
            background: #000;
            border: 2px solid #30363d; border-radius: 8px;
            width: 280px; height: 360px; margin: 0 auto; position: relative; overflow: hidden;
        }
        #game-canvas { display: block; width: 100%; height: 100%; background: #050508;
        }
        #game-meta-display {
            position: absolute;
            top: 5px; left: 5px; font-size: 11px; color: #fff;
            background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; pointer-events: none;
        }

        /* 下部コントロールバー */
        #playback-bar {
            height: 60px;
            background: var(--panel-bg); border-top: 1px solid #30363d;
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
            z-index: 10;
        }
        .play-controls { display: flex; align-items: center; gap: 15px;
        }

        /* ギミックダイアログ */
        #gimmick-dialog {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel-bg); border: 2px solid var(--accent);
            padding: 20px; border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: none; flex-direction: column; gap: 12px; z-index: 100; width: 240px;
        }
        #dialog-overlay {
            position: fixed;
            top:0; left:0; width:100vw; height:100vh;
            background: rgba(0,0,0,0.5); display: none; z-index: 99;
        }
        .fever-guide-txt {
            font-size: 11px; color: #ff9800; background: rgba(255, 152, 0, 0.1);
            padding: 6px; border-radius: 4px; border: 1px dashed rgba(255,152,0,0.3); margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="sidebar">
            <h2>METADATA</h2>
            <div class="control-group">
                <label>曲名 (TITLE)</label>
                <input type="text" id="meta-title" value="New Song" oninput="syncToGame()">
            </div>
            <div class="control-group">
                <label>難易度 (DIFFICULTY)</label>
                <select id="meta-difficulty" onchange="switchDifficulty(this.value)">
                    <option value="Easy">Easy</option>
                    <option value="Normal" selected>Normal</option>
                    <option value="Hard">Hard</option>
                    <option value="Expert">Expert</option>
                    <option value="Master">Master</option>
                    <option value="Custom">Custom</option>
                </select>
            </div>
            <div class="control-group">
                <label>レベル (LEVEL)</label>
                <input type="number" id="meta-level" value="10" min="1" max="50" oninput="updateCurrentLevel(this.value)">
            </div>
            <div class="control-group">
                <label>キー数 (LANES)</label>
                <select id="meta-lanes" onchange="changeLaneCount(parseInt(this.value, 10)); syncToGame();">
                    <option value="4">4K (4レーン)</option>
                    <option value="6">6K (6レーン)</option>
                    <option value="8" selected>8K (8レーン)</option>
                </select>
            </div>
            <div class="control-group">
                <label>初期BPM</label>
                <input type="number" id="meta-bpm" value="150" min="1" max="999" oninput="syncToGame()">
            </div>
            <div class="control-group">
                <label>INITIAL TIME SIGNATURE</label>
                <input type="text" id="meta-time-signature" value="4/4" placeholder="4/4" oninput="syncToGame()">
            </div>
            <div class="control-group">
                <label>音声ファイル名 (SONG)</label>
                <input type="text" id="meta-song" value="audio.ogg" placeholder="audio.ogg">
            </div>
            <div class="control-group">
                <label>背景画像ファイル (BACKGROUND)</label>
                <input type="text" id="meta-background" value="background.png" placeholder="background.png / jacket.jpg / image.webp">
            </div>
            <div class="control-group">
                <label>背景動画ファイル (MOVIE)</label>
                <input type="text" id="meta-movie" value="" placeholder="movie.mp4 / movie.webm / movie.mov">
            </div>
            <div class="control-group">
                <label>オフセット (OFFSET)</label>
                <input type="number" id="meta-offset" value="0.00" step="0.01">
            </div>

            <h2>AUDIO PREVIEW</h2>
            <div class="control-group">
                <label id="audio-label">① 試聴用音源を選択 (PCから選択)</label>
                <input type="file" id="audio-selector" accept="audio/*" onchange="loadAudioFile(this)">
            </div>
            <div class="control-group" style="margin-top: 5px;">
                <label id="se-label">② SE（打鍵音）: 自動ロード中...</label>
                <input type="file" id="se-selector" accept="audio/*" onchange="loadSEFile(this)">
            </div>

            <div class="volume-mixer">
                <div class="volume-row">
                    <label>BGM音量</label>
                    <input type="range" id="volume-bgm" min="0" max="1" step="0.01" value="0.50" oninput="updateVolume()">
                    <span id="volume-bgm-val" class="volume-val">50%</span>
                </div>
                <div class="volume-row">
                    <label>SE音量</label>
                    <input type="range" id="volume-se" min="0" max="1" step="0.01" value="0.70" oninput="updateVolume()">
                    <span id="volume-se-val" class="volume-val">70%</span>
                </div>
            </div>

            <h2>NOTE TYPE</h2>
            <div class="note-type-btn">
                <button id="btn-normal" class="active" onclick="setNoteType('normal')">Normal (白/青)</button>
                <button id="btn-hold" onclick="setNoteType('hold')">Hold (黄)</button>
                <button id="btn-long" onclick="setNoteType('long')">Long (紫)</button>
                <button id="btn-damage" onclick="setNoteType('damage')">Damage (赤)</button>
                <button id="btn-guide" onclick="setNoteType('guide')" style="background: #1f3a52;">Guide (緑帯)</button>
            </div>
            <div class="control-group" style="background: rgba(16, 185, 129, 0.08); padding: 8px; border-radius: 6px; border: 1px solid rgba(16,185,129,0.25);">
                <label>GUIDE NOTE COLOR</label>
                <input type="color" id="guide-color" value="#10b981" oninput="saveGuideColorPicker()">
                <div id="guide-palette" style="display:grid; grid-template-columns: repeat(6, 1fr); gap:4px; margin-top:4px;"></div>
                <div style="display:flex; gap:5px; margin-top:4px;">
                    <button onclick="addGuidePaletteColor()" style="flex:1; padding:4px; font-size:11px;">Save</button>
                    <button onclick="removeGuidePaletteColor()" style="flex:1; padding:4px; font-size:11px;">Remove</button>
                    <button id="guide-color-eyedropper" onclick="startGuideColorEyedropper()" style="flex:1; padding:4px; font-size:11px;">Pick</button>
                </div>
                <label>GUIDE NOTE OPACITY VALUE</label>
                <div style="display:flex; gap:6px; align-items:center;">
                    <input type="range" id="guide-opacity" min="0" max="1" step="0.01" value="1" oninput="updateGuideOpacityDisplay(); saveGuideOpacityPicker();" style="flex:1; padding:0;">
                    <span id="guide-opacity-val" style="width:38px; text-align:right; font-size:11px; font-family:monospace;">100%</span>
                </div>
                <div id="guide-opacity-palette" style="display:grid; grid-template-columns: repeat(6, 1fr); gap:4px; margin-top:4px;"></div>
                <div style="display:flex; gap:5px; margin-top:4px;">
                    <button onclick="addGuideOpacityPaletteValue()" style="flex:1; padding:4px; font-size:11px;">Save</button>
                    <button onclick="removeGuideOpacityPaletteValue()" style="flex:1; padding:4px; font-size:11px;">Remove</button>
                    <button id="guide-opacity-eyedropper" onclick="startGuideOpacityEyedropper()" style="flex:1; padding:4px; font-size:11px;">Pick</button>
                </div>
                <label>GUIDE NOTE OPACITY MODE</label>
                <select id="guide-opacity-mode">
                    <option value="solid" selected>100% uniform</option>
                    <option value="fade">Fade to 0% at end</option>
                    <option value="rise">Fade from 0% to value</option>
                </select>
            </div>
            <div class="fever-guide-txt">
                ✨ <b>Tabキー範囲指定:</b><br>
                Tabキーを押しながら縦スクロール・ドラッグすると、その区間を<b>フィーバータイム</b>に設定できます。
            </div>

            <h2>FILE IO</h2>
            <div class="file-buttons">
                <button id="import-btn" style="background:#8b949e; border-color:#30363d;" onclick="triggerImport()">譜面ファイルをインポート</button>
                <input type="file" id="import-file" accept=".2d,.sd,.txt" style="display:none;" onchange="importChart(this)">
            </div>
        </div>

        <div id="editor-container">
            <div id="canvas-wrapper">
                <canvas id="editor-canvas"></canvas>
                <canvas id="minimap-canvas" width="40"></canvas>
            </div>
        </div>

        <div id="grid-snap-sidebar">
            <span style="font-size: 10px; font-weight: bold; color: var(--text-muted); margin-bottom: 2px;">SNAP</span>
            <button class="snap-btn" id="snap-1" onclick="changeSnap(1)">1分</button>
            <button class="snap-btn" id="snap-2" onclick="changeSnap(2)">2分</button>
            <button class="snap-btn" id="snap-3" onclick="changeSnap(3)">3分</button>
            <button class="snap-btn" id="snap-4" onclick="changeSnap(4)">4分</button>
            <button class="snap-btn" id="snap-5" onclick="changeSnap(5)">5分</button>
            <button class="snap-btn" id="snap-6" onclick="changeSnap(6)">6分</button>
            <button class="snap-btn active" id="snap-8" onclick="changeSnap(8)">8分</button>
            <button class="snap-btn" id="snap-12" onclick="changeSnap(12)">12分</button>
            <button class="snap-btn" id="snap-16" onclick="changeSnap(16)">16分</button>
            <button class="snap-btn" id="snap-24" onclick="changeSnap(24)">24分</button>
            <button class="snap-btn" id="snap-32" onclick="changeSnap(32)">32分</button>
            <button class="snap-btn" id="snap-custom" onclick="changeSnap('custom')">その他</button>
            <input type="number" id="custom-snap-input" value="48" min="1" max="192" oninput="applyCustomSnap()">
        </div>

        <div id="right-panel">
            <div class="panel-section" style="border-bottom: 1px solid #30363d; padding-bottom: 15px;">
                <h2>GAME PLAY MODE (Fever演出対応)</h2>
                <div id="game-preview-zone">
                    <canvas id="game-canvas" width="280" height="360"></canvas>
                    <div id="game-meta-display">DIFF: Normal LV.10 / 8K</div>
                </div>
            </div>

            <div class="panel-section">
                <h2>SELECTION</h2>
                <div id="select-info" style="font-size:13px; color:var(--text-muted);">選択中のオブジェクト: 0コ</div>
                
                <div id="batch-edit-zone" style="display:none; flex-direction:column; gap:10px; margin-top:10px;">
                    <div class="control-group" style="background: #21262d; padding: 8px; border-radius: 6px;">
                        <label>ノーツカラーの個別指定</label>
                        <div style="display:flex; gap:5px; margin-top:4px;">
                            <input type="text" id="note-custom-color" placeholder="#ff0000" style="flex:1; padding:4px; font-size:12px;">
                            <button onclick="applyCustomColorToSelected()" style="padding:4px 8px; font-size:12px; background:var(--accent-active);">適用</button>
                        </div>
                    </div>
                    <div class="control-group" style="background: #21262d; padding: 8px; border-radius: 6px;">
                        <label>Guide opacity for selected guide notes</label>
                        <select id="note-guide-opacity-mode">
                            <option value="solid">100% uniform</option>
                            <option value="fade">Fade to 0% at end</option>
                            <option value="rise">Fade from 0% to value</option>
                        </select>
                        <div style="display:flex; gap:6px; align-items:center;">
                            <input type="range" id="note-guide-opacity" min="0" max="1" step="0.01" value="1" oninput="document.getElementById('note-guide-opacity-val').textContent = Math.round(parseFloat(this.value) * 100) + '%'" style="flex:1; padding:0;">
                            <span id="note-guide-opacity-val" style="width:38px; text-align:right; font-size:11px; font-family:monospace;">100%</span>
                        </div>
                        <button onclick="applyGuideOpacityToSelected()" style="padding:4px 8px; font-size:12px; background:var(--accent-active);">Apply</button>
                    </div>
                    <label>選択範囲にギミックを一括適用</label>
                    <select id="batch-gimmick-type">
                        <option value="BPM">BPM変化</option>
                        <option value="BS">BS (ソフラン速度倍率)</option>
                        <option value="TS">TS (多重スクロール倍率)</option>
                        <option value="SIG">Time Signature (4/4, 6/8)</option>
                        <option value="LANE">Lane Opacity (0 / 100~50)</option>
                    </select>
                    <input type="text" id="batch-gimmick-val" value="1.0">
                    <button onclick="applyBatchGimmick()" style="background: var(--accent-active);">ギミックを適用</button>
                    <button onclick="deleteSelected()" style="background:#da3637; border-color:#f85149;">選択したノーツを削除</button>
                </div>

                <h2>GIMMICKS & FEVER LIST</h2>
                <div id="gimmick-list-box" style="font-size:12px; max-height:150px; overflow-y:auto; background:#0d1117; padding:5px; border-radius:4px;">
                    <div style="color:var(--text-muted); text-align:center;">イベントなし</div>
                </div>
            </div>
        </div>
    </div>

    <div id="playback-bar">
        <div class="play-controls">
            <button id="play-btn" onclick="togglePlayback()" style="background: var(--accent-active); width: 100px;">再生 (Space)</button>
            <button id="undo-btn" onclick="undoLastAction()" disabled style="width: 86px;">Undo</button>
            <span style="font-size: 13px; color: var(--text-muted);">
                現在の位置: <span id="current-beat-disp" style="color:#fff; font-weight:bold;">0.00</span> 拍目
            </span>
            <label style="margin: 0; margin-left: 15px;">速度:</label>
            <select id="playback-rate" onchange="changePlaybackRate(this.value)" style="padding: 4px;">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1.0" selected>1.0x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
            </select>
        </div>
        <div>
            <button id="export-btn" style="background: var(--success); border-color: var(--success-active); padding: 8px 16px; font-size: 14px;" onclick="exportChart()">譜面を上書き保存 (chart.2d)</button>
        </div>
    </div>

    <div id="dialog-overlay" onclick="closeGimmickDialog()"></div>
    <div id="gimmick-dialog">
        <h3 style="margin:0; font-size:14px; color:var(--accent);">ギミックイベントの追加</h3>
        <div style="font-size:12px; color:var(--text-muted);">対象位置: <span id="dialog-beat-disp">0.00</span> 拍目</div>
        <div class="control-group">
            <label>タイプ</label>
            <select id="dialog-type">
                <option value="BPM">BPM変化 (テンポ変更)</option>
                <option value="BS">BS変化 (弐寺風ソフラン)</option>
                <option value="TS">TS変化 (太鼓風多重スクロール)</option>
                <option value="SIG">Time Signature (4/4, 6/8)</option>
                        <option value="LANE">Lane Opacity (0 / 100~50)</option>
            </select>
        </div>
        <div class="control-group">
            <label>設定値 (数値)</label>
            <input type="text" id="dialog-val" value="150">
        </div>
        <div style="display:flex; gap:5px; margin-top:5px;">
            <button onclick="saveGimmickDialog()" style="flex:1; background:#238636;">保存</button>
            <button onclick="closeGimmickDialog()" style="flex:1; background:var(--box-bg);">キャンセル</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('editor-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('editor-container');

        const minimapCanvas = document.getElementById('minimap-canvas');
        const minimapCtx = minimapCanvas.getContext('2d');

        const gameCanvas = document.getElementById('game-canvas');
        const gameCtx = gameCanvas.getContext('2d');

        // 難易度別の譜面データを管理する構造
        const DIFFICULTIES = ["Easy", "Normal", "Hard", "Expert", "Master", "Custom"];
        let currentDifficulty = "Normal";

        let chartData = {
            Easy: { level: 5, notes: [], changeEvents: [], feverSections: [] },
            Normal: { level: 10, notes: [], changeEvents: [], feverSections: [] },
            Hard: { level: 15, notes: [], changeEvents: [], feverSections: [] },
            Expert: { level: 20, notes: [], changeEvents: [], feverSections: [] },
            Master: { level: 25, notes: [], changeEvents: [], feverSections: [] },
            Custom: { level: 10, notes: [], changeEvents: [], feverSections: [] }
        };

        // ショートカット参照用
        let notes = chartData[currentDifficulty].notes;
        let changeEvents = chartData[currentDifficulty].changeEvents;
        let feverSections = chartData[currentDifficulty].feverSections;

        let currentNoteType = 'normal';
        const UNDO_LIMIT = 80;
        let undoStack = [];
        let isGuideColorEyedropper = false;
        let isGuideOpacityEyedropper = false;
        let gridSnap = 8; 
        let currentSnapSetting = 8; 

        let importedFileName = "chart.2d"; // デフォルトファイル名
        let viewBeat = 0.0; 
        let TOTAL_LANES = 8; 
        const LANE_WIDTH = 50;
        const START_X = 50;
        let BEAT_HEIGHT = 200; 

        // 音響関連
        let audioCtx = null;
        let bgmGainNode = null; 
        let seGainNode = null;  
        let audioBuffer = null;
        let audioSource = null;
        let isPlaying = false;
        let startTime = 0;
        let playbackRate = 1.0; 
        let waveformData = [];
        let seBuffer = null;
        let playedNotesMap = new Set();
        let isDragging = false;
        let isSelectMode = false;
        let isRightDragging = false;
        let isMinimapDragging = false;
        let isTabPressed = false; 
        let feverStartBeat = null; 

        let dragStartPos = { x: 0, y: 0 };
        let dragCurrentPos = { x: 0, y: 0 };
        let lastMouseY = 0;          
        let selectedNotes = [];

        let longStartBeat = null;
        let longStartLane = null;
        let mouseCurrentBeat = 0; 
        let mouseCurrentLane = 1;

        let activeDialogBeat = 0;
        let lastFpsUpdateTime = 0;
        let frameCount = 0;
        let currentFps = 0;

        // ミニマップ用パラメータ
        const MINIMAP_MAX_BEAT = 400;


        function parseTimeSignature(value) {
            const raw = String(value || '4/4').trim();
            const parts = raw.split('/').map(v => parseInt(v.trim(), 10));
            const numerator = parts[0] > 0 ? parts[0] : 4;
            const denominator = parts[1] > 0 ? parts[1] : 4;
            return { numerator, denominator, text: numerator + '/' + denominator, length: numerator * (4 / denominator) };
        }
        function getInitialTimeSignature() {
            const input = document.getElementById('meta-time-signature');
            return parseTimeSignature(input ? input.value : '4/4');
        }
        function normalizeTimeSignature(value) { return parseTimeSignature(value).text; }
        function parseChangeValue(type, rawValue) {
            if (type === 'SIG') return normalizeTimeSignature(rawValue);
            if (type === 'LANE') return String(rawValue || '100').trim();
            const numeric = parseFloat(rawValue);
            return Number.isFinite(numeric) ? numeric : 0;
        }
        function formatChangeValue(event) { return event.type === 'SIG' ? normalizeTimeSignature(event.val) : event.val; }
        function laneOpacityNumber(value, fallback = 100) {
            const n = parseFloat(value);
            if (!Number.isFinite(n)) return fallback;
            return Math.max(0, Math.min(100, n));
        }
        function laneOpacitySpec(event) {
            const raw = String(event && event.val !== undefined ? event.val : '100').trim();
            const parts = raw.split('~');
            const from = laneOpacityNumber(parts[0], 100);
            const to = parts.length > 1 ? laneOpacityNumber(parts[1], from) : from;
            return { from, to, range: parts.length > 1 };
        }
        function laneOpacityAtBeat(beat) {
            const events = changeEvents.filter(e => e.type === 'LANE').sort((a,b) => (a.beat || 0) - (b.beat || 0));
            if (!events.length) return 1;
            let current = null, next = null;
            for (let i = 0; i < events.length; i++) {
                if ((events[i].beat || 0) <= beat) { current = events[i]; next = events[i + 1] || null; }
                else break;
            }
            if (!current) return 1;
            const spec = laneOpacitySpec(current);
            if (!spec.range || !next || (next.beat || 0) <= (current.beat || 0)) return spec.to / 100;
            const p = Math.max(0, Math.min(1, (beat - current.beat) / (next.beat - current.beat)));
            return (spec.from + (spec.to - spec.from) * p) / 100;
        }
        function getTimeSignatureEvents() {
            return changeEvents.filter(e => e.type === 'SIG')
                .map(e => ({ beat: e.beat || 0, sig: parseTimeSignature(e.val) }))
                .sort((a, b) => a.beat - b.beat);
        }
        function getMeasureLineBeats(minBeat, maxBeat) {
            const events = getTimeSignatureEvents();
            const sections = [{ beat: 0, sig: getInitialTimeSignature() }, ...events];
            const beats = [];
            for (let i = 0; i < sections.length; i++) {
                const start = sections[i].beat;
                const end = i + 1 < sections.length ? sections[i + 1].beat : maxBeat;
                const length = Math.max(0.0001, sections[i].sig.length);
                const first = start + Math.max(0, Math.ceil((minBeat - start) / length)) * length;
                for (let beat = first; beat <= Math.min(end, maxBeat) + 0.0001; beat += length) {
                    if (beat >= minBeat - 0.0001) beats.push(parseFloat(beat.toFixed(6)));
                }
            }
            return [...new Set(beats.map(b => b.toFixed(6)))].map(Number).sort((a, b) => a - b);
        }
        function isMeasureLineBeat(beat) { return getMeasureLineBeats(beat - 0.001, beat + 0.001).some(b => Math.abs(b - beat) < 0.002); }
        function colorWithAlpha(color, alpha) {
            if (!color) return 'rgba(16, 185, 129, ' + alpha + ')';
            if (color.startsWith('#')) {
                let hex = color.slice(1);
                if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
                const value = parseInt(hex.slice(0, 6), 16);
                if (!Number.isNaN(value)) {
                    const r = (value >> 16) & 255, g = (value >> 8) & 255, b = value & 255;
                    return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
                }
            }
            if (color.startsWith('rgb(')) return color.replace('rgb(', 'rgba(').replace(')', ', ' + alpha + ')');
            return color;
        }
        function getGuideColor(note) {
            const picker = document.getElementById('guide-color');

        }

        const GUIDE_PALETTE_KEY = '864beatGuidePalette';

        let guidePaletteColors = [];

        function normalizeHexColor(color) {

        function loadGuidePalette() {

        function addGuidePaletteColor() {

        function clampOpacity(value) {
            const numeric = parseFloat(value);
            if (!Number.isFinite(numeric)) return 1;
            return Math.max(0, Math.min(1, numeric));
        }

        function getGuideOpacityValue(note) {
            if (note && note.guideOpacity !== undefined) return clampOpacity(note.guideOpacity);
            const input = document.getElementById('guide-opacity');
            return input ? clampOpacity(input.value) : 1;

        function updateGuideOpacityDisplay() {

        function saveGuideOpacityPicker() {

        function saveGuideOpacityPalette() {

        function renderGuideOpacityPalette() {
            const palette = document.getElementById('guide-opacity-palette');
            if (!palette) return;
            const current = clampOpacity(document.getElementById('guide-opacity')?.value || 1);
            palette.innerHTML = '';
            guideOpacityPaletteValues.forEach(value => {
                const alpha = clampOpacity(value);

                btn.style.cssText = 'height:22px; padding:0; font-size:10px; border-radius:4px; color:#fff; background:rgba(16,185,129,' + alpha + '); border:' + (Math.abs(alpha - current) < 0.005 ? '2px solid #fff' : '1px solid #30363d') + ';';

        function addGuideOpacityPaletteValue() {

        function removeGuideOpacityPaletteValue() {

        function setGuideEyedropperState() {
            const colorBtn = document.getElementById('guide-color-eyedropper');

        }

        function startGuideColorEyedropper() {

            if (isGuideColorEyedropper) isGuideOpacityEyedropper = false;
            setGuideEyedropperState();
        }

        function startGuideOpacityEyedropper() {
            isGuideOpacityEyedropper = !isGuideOpacityEyedropper;
            if (isGuideOpacityEyedropper) isGuideColorEyedropper = false;
            setGuideEyedropperState();
        }

        function pickGuideSettingsAt(beat, lane) {
            const guide = notes.find(n => n.lane === lane && n.type === 'guide' && beat >= n.beat && beat <= n.endBeat);
            if (!guide) return false;
            if (isGuideColorEyedropper) {
                document.getElementById('guide-color').value = normalizeHexColor(getGuideColor(guide));
                saveGuideColorPicker();
            }
            if (isGuideOpacityEyedropper) {
                document.getElementById('guide-opacity').value = getGuideOpacityValue(guide);
                updateGuideOpacityDisplay();
                saveGuideOpacityPicker();
            }
            isGuideColorEyedropper = false;
            isGuideOpacityEyedropper = false;
            setGuideEyedropperState();
            return true;
        }
        function getGuideOpacityMode(note) {
            if (note.guideOpacityMode === 'fade') return 'fade';
            if (note.guideOpacityMode === 'rise') return 'rise';
            return 'solid';
        }
        function fillGuideRect(drawCtx, x, yStart, yEnd, width, note) {
            const color = getGuideColor(note);
            const top = Math.min(yStart, yEnd);
            const height = Math.abs(yStart - yEnd);
            if (height <= 0) return;
            if (getGuideOpacityMode(note) === 'fade') {
                const gradient = drawCtx.createLinearGradient(0, yStart, 0, yEnd);
                const opacity = getGuideOpacityValue(note);
                gradient.addColorStop(0, colorWithAlpha(color, opacity));
                gradient.addColorStop(1, colorWithAlpha(color, 0));
                drawCtx.fillStyle = gradient;
            } else if (getGuideOpacityMode(note) === 'rise') {
                const gradient = drawCtx.createLinearGradient(0, yStart, 0, yEnd);
                const opacity = getGuideOpacityValue(note);
                gradient.addColorStop(0, colorWithAlpha(color, 0));
                gradient.addColorStop(1, colorWithAlpha(color, opacity));
                drawCtx.fillStyle = gradient;
            } else {
                drawCtx.fillStyle = colorWithAlpha(color, getGuideOpacityValue(note));
            }
            drawCtx.fillRect(x, top, width, height);
        }

        function cloneChartState() {
            return {
                chartData: JSON.parse(JSON.stringify(chartData)),
                currentDifficulty,

                viewBeat
            };

        function refreshChartRefs() {

            changeEvents = chartData[currentDifficulty].changeEvents;
            feverSections = chartData[currentDifficulty].feverSections;
        }

        function updateUndoButton() {
            const btn = document.getElementById('undo-btn');
            if (btn) btn.disabled = undoStack.length === 0;
        }

        function recordUndo() {
            undoStack.push(cloneChartState());
            if (undoStack.length > UNDO_LIMIT) undoStack.shift();
            updateUndoButton();
        }

        function clearUndoHistory() {
            undoStack = [];
            updateUndoButton();
        }

        function undoLastAction() {
            const prev = undoStack.pop();
            if (!prev) return;
            chartData = JSON.parse(JSON.stringify(prev.chartData));
            currentDifficulty = prev.currentDifficulty;
            TOTAL_LANES = prev.totalLanes;
            viewBeat = prev.viewBeat;
            document.getElementById('meta-difficulty').value = currentDifficulty;
            document.getElementById('meta-lanes').value = TOTAL_LANES;
            document.getElementById('meta-level').value = chartData[currentDifficulty].level;
            refreshChartRefs();
            selectedNotes = [];

            longStartLane = null;
            resizeCanvas();
            updateSelection();
            updateGimmickList();
            syncToGame();

        function initEditor() {
            resizeCanvas();
            updateGimmickList();
            syncToGame();
            
            // 初期化時に同一ディレクトリのSE.oggを自動読み込み
            preloadDefaultSE();
            loadGuidePalette();

            window.addEventListener('resize', resizeCanvas);
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            
            // ミニマップのイベント登録
            minimapCanvas.addEventListener('mousedown', handleMinimapDown);
            minimapCanvas.addEventListener('mousemove', handleMinimapMove);
            window.addEventListener('mouseup', () => { isMinimapDragging = false; });

            canvas.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                if (e.ctrlKey) {
                    const rect = canvas.getBoundingClientRect();
                    const mouseY = e.clientY - rect.top;
                    const rawBeat = yToBeat(mouseY);
                    const snappedBeat = getSnappedBeat(rawBeat);
                    openGimmickDialog(snappedBeat);
                }
            });
            container.addEventListener('wheel', function(e) {
                e.preventDefault();
                if (e.ctrlKey) {
                    const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                    BEAT_HEIGHT = Math.max(50, Math.min(800, BEAT_HEIGHT * zoomFactor));
                } else {
                    if (isPlaying) return;
                    const delta = e.deltaY * 0.005;
                    viewBeat = Math.max(0, viewBeat + delta);
                }
            }, { passive: false });

            window.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.code === 'KeyZ') {
                    e.preventDefault();
                    undoLastAction();
                    return;
                }
                if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
                    e.preventDefault();
                    togglePlayback();
                }
                if (e.code === 'Tab') {
                    e.preventDefault();
                    if (!isTabPressed) {
                        isTabPressed = true;
                        feverStartBeat = mouseCurrentBeat;
                    }
                }
            });

            window.addEventListener('keyup', e => {
                if (e.code === 'Tab') {
                    e.preventDefault();
                    isTabPressed = false;
                    if (feverStartBeat !== null && Math.abs(feverStartBeat - mouseCurrentBeat) > 0.01) {
                        let bStart = Math.min(feverStartBeat, mouseCurrentBeat);
                        let bEnd = Math.max(feverStartBeat, mouseCurrentBeat);
                        recordUndo();
                        feverSections.push({ startBeat: bStart, endBeat: bEnd });
                        updateGimmickList();
                    }
                    feverStartBeat = null;
                }
            });

            function drawLoop() {
                if (isPlaying) {
                    const curBeat = getCurrentBeat();
                    document.getElementById('current-beat-disp').textContent = curBeat.toFixed(2);
                    viewBeat = curBeat; 
                    checkAndPlaySE(curBeat); 
                }
                draw();
                drawMinimap();
                drawGame(); 
                requestAnimationFrame(drawLoop);
            }
            requestAnimationFrame(drawLoop);
        }

        // 同一フォルダ内のSE.oggを自動取得する関数
        function preloadDefaultSE() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            fetch('SE.ogg')
                .then(response => {
                    if (!response.ok) throw new Error('SE.ogg が見つからないか、読み込めませんでした。');
                    return response.arrayBuffer();
                })
                .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
                .then(buffer => {
                    seBuffer = buffer;
                    document.getElementById('se-label').textContent = `② SE（打鍵音）: SE.ogg (自動ロード完了)`;
                })
                .catch(err => {
                    document.getElementById('se-label').textContent = `② SE（打鍵音）を選択`;
                    console.warn("SE.oggの自動ロードをスキップしました (手動選択可能):", err.message);
                });
        }

        // ミニマップのクリック・ドラッグ処理
        function handleMinimapDown(e) {
            isMinimapDragging = true;
            scrollToMinimapPos(e);
        }

        function handleMinimapMove(e) {
            if (!isMinimapDragging) return;
            scrollToMinimapPos(e);
        }

        function scrollToMinimapPos(e) {
            if (isPlaying) return; 
            const rect = minimapCanvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            const ratio = mouseY / minimapCanvas.height;
            const maxBeat = getMaxChartBeat();
            const targetBeat = maxBeat * (1 - ratio);
            viewBeat = Math.max(0, targetBeat);
            document.getElementById('current-beat-disp').textContent = viewBeat.toFixed(2);
        }

        function getMaxChartBeat() {
            let max = MINIMAP_MAX_BEAT;
            if (audioBuffer) {
                max = timeToBeat(audioBuffer.duration);
            }
            notes.forEach(n => {
                const b = (n.type === 'long' || n.type === 'guide') ? n.endBeat : n.beat;
                if (b > max) max = b;
            });
            return max + 10;
        }

        // ミニマップの描画
        function drawMinimap() {
            minimapCtx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);
            const mW = minimapCanvas.width;
            const mH = minimapCanvas.height;
            const maxBeat = getMaxChartBeat();

            function beatToMinimapY(beat) {
                return mH - (beat / maxBeat) * mH;
            }

            feverSections.forEach(fs => {
                const yStart = beatToMinimapY(fs.startBeat);
                const yEnd = beatToMinimapY(fs.endBeat);
                minimapCtx.fillStyle = 'rgba(255, 152, 0, 0.3)';
                minimapCtx.fillRect(0, yEnd, mW, yStart - yEnd);
            });

            changeEvents.forEach(e => {
                const y = beatToMinimapY(e.beat);
                minimapCtx.strokeStyle = 'rgba(255, 85, 255, 0.5)';
                minimapCtx.lineWidth = 1;
                minimapCtx.beginPath(); minimapCtx.moveTo(0, y); minimapCtx.lineTo(mW, y); minimapCtx.stroke();
            });            minimapCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            minimapCtx.lineWidth = 1;
            getMeasureLineBeats(0, maxBeat).forEach(b => {
                const y = beatToMinimapY(b);
                minimapCtx.beginPath(); minimapCtx.moveTo(0, y); minimapCtx.lineTo(mW, y); minimapCtx.stroke();
            });

            notes.forEach(n => {
                if (n.lane > TOTAL_LANES) return;
                const y = beatToMinimapY(n.beat);
                const nW = mW / TOTAL_LANES;
                const nX = (n.lane - 1) * nW;

                if (n.type === 'guide') {
                    const yEnd = beatToMinimapY(n.endBeat);
                    minimapCtx.fillStyle = colorWithAlpha(getGuideColor(n), getGuideOpacityMode(n) === 'fade' ? getGuideOpacityValue(n) * 0.35 : getGuideOpacityValue(n) * 0.65);
                    minimapCtx.fillRect(nX, yEnd, nW, y - yEnd);
                } else if (n.type === 'long') {
                    const yEnd = beatToMinimapY(n.endBeat);
                    minimapCtx.fillStyle = 'rgba(187, 128, 255, 0.5)';
                    minimapCtx.fillRect(nX, yEnd, nW, y - yEnd);
                } else {
                    if (n.type === 'damage') minimapCtx.fillStyle = '#f85149';
                    else if (n.type === 'hold') minimapCtx.fillStyle = '#d4a727';
                    else minimapCtx.fillStyle = '#58a6ff';
                    minimapCtx.fillRect(nX, y - 1, nW, 2);
                }
            });

            const minRenderBeat = yToBeat(canvas.height);
            const maxRenderBeat = yToBeat(0);
            const yViewStart = beatToMinimapY(Math.max(0, minRenderBeat));
            const yViewEnd = beatToMinimapY(maxRenderBeat);

            minimapCtx.fillStyle = 'rgba(88, 166, 255, 0.15)';
            minimapCtx.fillRect(0, yViewEnd, mW, yViewStart - yViewEnd);
            minimapCtx.strokeStyle = '#00ffff';
            minimapCtx.lineWidth = 1.5;
            minimapCtx.strokeRect(0, yViewEnd, mW, yViewStart - yViewEnd);

            const yCurrent = beatToMinimapY(viewBeat);
            const isFeverNow = feverSections.some(fs => viewBeat >= fs.startBeat && viewBeat <= fs.endBeat);
            minimapCtx.strokeStyle = isFeverNow ? '#ff9800' : '#00ffff';
            minimapCtx.lineWidth = 2;
            minimapCtx.beginPath(); minimapCtx.moveTo(0, yCurrent); minimapCtx.lineTo(mW, yCurrent); minimapCtx.stroke();
        }

        // 難易度を切り替える関数
